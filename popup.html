<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comment Filtter</title>
    <link rel="stylesheet" href="style.css" />
    <script src="popup.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h4 class="secondary-title">Block List (Banned contexts)</h4>
      <div id="words-list" class="scrollable-container"></div>

      <form class="input-section" id="add-to-blocklist" dir="auto">
        <input
          type="text"
          id="word-input"
          placeholder="Type a Text..."
          dir="auto"
        />
        <button id="add-btn">+</button>
      </form>

      <h4 class="secondary-title">Block Log (last 50 comments)</h4>
      <div id="comments-log" class="scrollable-container comments-log"></div>

      <footer>
        <span>&copy; 2026 Ahmed Al-jbri</span>

        <a
          href="https://github.com/al-jbri/comment-filtter"
          target="_blank"
          class="github-btn"
        >
          <img src="images/github.svg" alt="GitHub" /> <span>GitHub Repo</span>
        </a>

        <span class="dua-msg">Keep us in your Du'a</span>
      </footer>
    </main>
  </body>
</html>
